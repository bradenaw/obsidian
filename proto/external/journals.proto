syntax = "proto3";

package obsidian_external;

import "google/protobuf/empty.proto";

service Journals {
    rpc Append(JournalAppendReq) returns (JournalSeqResp);
    rpc Tail(JournalTailReq) returns (stream JournalTailResp);
    rpc OldestAvailable(JournalNameReq) returns (JournalSeqResp);
    rpc Latest(JournalNameReq) returns (JournalSeqResp);
}

message JournalName {
    oneof journal_name {
        uint32 shard_id = 1;
    }
}

message JournalAppendReq {
    JournalName journal_name = 1;
    bytes entry = 2;
}

message JournalSeqResp {
    uint64 seq = 1;
}

message JournalTailReq {
    JournalName journal_name = 1;
    uint64 first = 2;
}

message JournalTailResp {
    repeated JournalTailEntry entries = 1;
}

message JournalTailEntry {
    uint64 seq = 1;
    bytes entry = 2;
}

message JournalNameReq {
    JournalName journal_name = 1;
}
