syntax = "proto3";

package obsidian;

import "google/protobuf/empty.proto";

service Obsidian {
    rpc Get(GetReq) returns (GetResp);
    rpc Scan(ScanReq) returns (ScanResp);

    rpc GetLatest(GetLatestReq) returns (GetLatestResp);
    //rpc LatestSnapshot(GetLatestReq) returns (LatestSnapshotResp);

    rpc Write(WriteReq) returns (WriteResp);

    rpc CreateColoGroup(CreateColoGroupReq) returns (google.protobuf.Empty);
    rpc CreateKeyspace(CreateKeyspaceReq) returns (google.protobuf.Empty);
}

message GetReq {
    fixed64 snapshot_ts = 1;
    repeated Key keys = 2;
}

message GetResp {
    repeated GetResult results = 1;
}

message ScanReq {
    fixed64 snapshot_ts = 1;
    KeyspaceId keyspace_id = 2;
    Range range = 3;
    Direction direction = 4;
    uint64 limit = 5;
}

message ScanResp {
    repeated Record records = 1;
    Range remaining = 2;
}

message GetLatestReq {
    repeated Key keys = 1;
}

message GetLatestResp {
    fixed64 snapshot_ts = 1;
    repeated GetResult results = 2;
}

message LatestSnapshotResp {
    fixed64 snapshot_ts = 1;
}


message WriteReq {
    repeated Precondition preconds = 1;
    repeated KeyMutation muts = 3;
}

message WriteResp {
    fixed64 write_ts = 1;
}

message CreateColoGroupReq {
    uint32 colo_group_id = 1;
    repeated Bound initial_splits = 2;
}

message CreateKeyspaceReq {
    KeyspaceId keyspace_id = 1;
}

message GetResult {
    oneof result_type {
        Record record = 1;
        google.protobuf.Empty not_found = 2;
    }
}

message Precondition {
    message NotChangedSince {
        Key key = 1;
        fixed64 ts = 2;
    }

    oneof precond_type {
        NotChangedSince not_changed_since = 1;
    }
}

message Mutation {
    oneof mutation_type {
        bytes put = 2;
        google.protobuf.Empty delete = 3;
    }
}

message KeyMutation {
    Key key = 1;
    Mutation mutation = 2;
}

message Record {
    Key key = 1;
    fixed64 ts = 2;
    bytes value = 3;
}

message Revision {
    Key key = 1;
    fixed64 ts = 2;
    RevisionValue value = 3;
}

message RevisionValue {
    oneof value_type {
        bytes regular = 1;
        google.protobuf.Empty tombstone = 2;
    }
}

message Key {
    KeyspaceId keyspace_id = 1;
    bytes bytes = 2;
}

message Range {
    Bound lower = 1;
    Bound upper = 2;
}

message Bound {
    oneof bound_type {
        google.protobuf.Empty before_all = 1;
        bytes before = 2;
        bytes after = 3;
        bytes after_prefix = 4;
        google.protobuf.Empty after_all = 5;
    }
}

enum Direction {
    DIRECTION_UNKNOWN = 0;
    DIRECTION_ASC = 1;
    DIRECTION_DESC = 2;
}

message KeyspaceId {
    uint32 colo_group_id = 1;
    uint32 id = 2;
}
