syntax = "proto3";

package obsidian_internal;

import "google/protobuf/empty.proto";

import "obsidian.proto";

message Txid {
    fixed64 ts = 1;
    fixed64 rand0 = 2;
    fixed64 rand1 = 3;
    uint32 owner_shard_id = 4;
}

message TxOutcome {
    oneof outcome {
        fixed64 committed = 1;
        google.protobuf.Empty aborted = 2;
    }
}

message TxOutcomeRecord {
    message Committed {
        fixed64 ts = 1;
        CompressedKeySet precond_keys = 2;
        CompressedKeySet mut_keys = 3;
    }

    oneof outcome_type {
        Committed committed = 1;
        google.protobuf.Empty aborted = 2;
    }
}

message CompressedKeySet {
    repeated obsidian.KeyspaceId keyspace_ids = 1;
    repeated bytes key_fragments = 2;
    repeated uint32 key_shared_prefixes = 3;
    repeated uint32 key_keyspaces_counts = 4;
    repeated uint32 key_keyspaces_refs = 5;
}

message TabletId {
    uint32 shard_id = 1;
    uint64 id = 2;
}

message NodeId {
    IpAddr addr = 1;
    uint32 port = 2;
    Uuid uuid = 3;
}

message IpAddr {
    oneof addr_type {
        Ipv4Addr v4 = 1;
        Ipv6Addr v6 = 2;
    }
}

message Ipv4Addr {
    // Big-endian.
    fixed32 bits = 1;
}

message Ipv6Addr {
    // Big-endian.
    fixed64 a = 1;
    fixed64 b = 2;
}

message Uuid {
    // Both in big-endian order.
    fixed64 high = 1;
    fixed64 low = 2;
}
