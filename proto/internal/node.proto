syntax = "proto3";

package obsidian_internal;

import "google/protobuf/empty.proto";

import "internal/internal.proto";
import "obsidian.proto";

service Node {
    rpc TabletGet(TabletGetReq) returns (obsidian.GetResp);
    rpc TabletScanPage(TabletScanPageReq) returns (obsidian.ScanResp);
    rpc TabletGetLatest(TabletGetLatestReq) returns (obsidian.GetLatestResp);
    rpc TabletLatestSnapshot(TabletGetLatestReq) returns (obsidian.LatestSnapshotResp);
    //rpc TabletHistoryPage(TabletHistoryPageReq) returns (obsidian.HistoryPageResp);
    rpc TabletWrite(TabletWriteReq) returns (obsidian.WriteResp);
    rpc TabletPrepare(TabletPrepareReq) returns (TabletPrepareResp);
    rpc TabletTryCommit(TabletTryCommitReq) returns (TxOutcomeResp);
    rpc TabletTryAbort(TabletTxidReq) returns (TxOutcomeResp);
    rpc TabletWait(TabletTxidReq) returns (TxOutcomeResp);
    rpc TabletCleanupCommitted(TabletCleanupCommittedReq) returns (google.protobuf.Empty);
    rpc TabletWaitMetaSync(TabletWaitMetaSyncReq) returns (google.protobuf.Empty);
    rpc TabletManifest(TabletEmptyReq) returns (TabletManifestResp);
    rpc TabletWaitMostlyHydrated(TabletEmptyReq) returns (google.protobuf.Empty);
    rpc TabletCatchup(TabletEmptyReq) returns (google.protobuf.Empty);
    rpc TabletFindSplit(TabletEmptyReq) returns (TabletFindSplitResp);
}

message TabletGetReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;
    obsidian.GetReq inner = 3;
}

message TabletScanPageReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;
    obsidian.ScanReq inner = 3;
}

message TabletGetLatestReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;
    obsidian.GetLatestReq inner = 3;
}

//message TabletHistoryPageReq {
//    TabletId tablet_id = 1;
//    NodeId node_id = 2;
//    obsidian.HistoryPageReq inner = 3;
//}

message TabletWriteReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;
    obsidian.WriteReq inner = 3;
}

message TabletPrepareReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;

    Txid txid = 3;
    repeated obsidian.Precondition preconds = 4;
    repeated obsidian.KeyMutation muts = 5;
}

message TabletPrepareResp {
    fixed64 prepare_ts = 1;
}

message TabletTryCommitReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;
    Txid txid = 3;
    fixed64 ts = 4;
    repeated obsidian.Key precond_keys = 5;
    repeated obsidian.Key mut_keys = 6;
}

message TabletTxidReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;
    Txid txid = 3;
}

message TxOutcomeResp {
    TxOutcome tx_outcome = 1;
}

message TabletCleanupCommittedReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;
    Txid txid = 3;
    fixed64 ts = 4;
    repeated obsidian.Key precond_keys = 5;
    repeated obsidian.Key mut_keys = 6;
}

message TabletEmptyReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;
}

message TabletWaitMetaSyncReq {
    TabletId tablet_id = 1;
    NodeId node_id = 2;
    fixed64 ts = 3;
}

message TabletManifestResp {
    Manifest manifest = 1;
}

message TabletFindSplitResp {
    obsidian.Bound bound = 1;
}
