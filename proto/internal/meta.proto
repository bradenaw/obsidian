syntax = "proto3";

package obsidian_internal;

import "google/protobuf/empty.proto";

import "internal/internal.proto";
import "obsidian.proto";

message MetaTx {
    CompressedKeySet keys = 1;
}

message MetaTablet {
    repeated uint32 colo_group_ids = 1;
    repeated obsidian.Range ranges = 2;
}
