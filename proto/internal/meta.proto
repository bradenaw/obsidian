syntax = "proto3";

package obsidian_internal;

import "google/protobuf/empty.proto";

import "internal/internal.proto";
import "obsidian.proto";

message MetaValue {
    oneof value_type {
        google.protobuf.Empty empty = 1;
        MetaTx meta_tx = 2;
        ShardMetadata shard_metadata = 3;
        TabletMetadata tablet_metadata = 4;
        TransferMetadata transfer_metadata = 5;
    }
}

message MetaTx {
    CompressedKeySet keys = 1;
}

message TabletMetadata {
    uint32 colo_group_id = 1;
    obsidian.Range range = 2;
    TabletState state = 3;
    TabletState next_state = 4;
    Uuid transfer_id = 5;
}

enum TabletState {
    TABLET_STATE_UNKNOWN = 0;
    TABLET_STATE_DEFUNCT = 1;
    TABLET_STATE_HYDRATING = 2;
    TABLET_STATE_ACTIVE = 3;
    TABLET_STATE_FROZEN = 4;
}

message TransferMetadata {
    TransferState state = 1;
    TransferState next_state = 2;
    repeated TabletId srcs = 3;
    repeated TabletId dsts = 4;
    fixed64 timestamp_ms = 5;
}

enum TransferState {
    TRANSFER_STATE_UNKNOWN = 0;
    TRANSFER_STATE_COPY = 1;
    TRANSFER_STATE_CATCHUP = 2;
    TRANSFER_STATE_SYNCED = 3;
    TRANSFER_STATE_HANDOFF = 4;
    TRANSFER_STATE_COMPLETE = 5;
    TRANSFER_STATE_ABORTED = 6;
}

message ShardMetadata {
    NodeId assigned_node_id = 1;
}

message TabletId {
    uint32 shard_id = 1;
    uint64 id = 2;
}

message NodeId {
    IpAddr addr = 1;
    uint32 port = 2;
    Uuid uuid = 3;
}

message IpAddr {
    oneof addr_type {
        Ipv4Addr v4 = 1;
        Ipv6Addr v6 = 2;
    }
}

message Ipv4Addr {
    // Big-endian.
    fixed32 bits = 1;
}

message Ipv6Addr {
    // Big-endian.
    fixed64 a = 1;
    fixed64 b = 2;
}

message Uuid {
    // Both in big-endian order.
    fixed64 high = 1;
    fixed64 low = 2;
}
